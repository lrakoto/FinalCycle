<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peak Tax Partners – Submissions Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #1a2550;
      --navy-deep: #111c3d;
      --orange:    #e8891e;
      --bg:        #f0f2f8;
      --card:      #ffffff;
      --border:    #e1e4f0;
      --text:      #1a1f36;
      --mid:       #4e5470;
      --muted:     #8890ab;
      --error:     #c0392b;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Login ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 8px 36px rgba(26,37,80,0.13);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .login-card img { height: 48px; margin-bottom: 28px; }

    .login-card h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .login-card p { font-size: 0.8rem; color: var(--muted); margin-bottom: 28px; }

    .login-card input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9375rem;
      color: var(--text);
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .login-card input:focus { outline: none; border-color: var(--navy); }

    .login-card button {
      width: 100%;
      padding: 13px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-card button:hover { background: var(--orange); }

    #login-error {
      color: var(--error);
      font-size: 0.8rem;
      margin-top: 10px;
      display: none;
    }

    /* ── Dashboard ── */
    #dashboard { display: none; }

    header {
      background: var(--navy);
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      box-shadow: 0 2px 12px rgba(26,37,80,0.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header img { height: 34px; }

    .header-right { display: flex; align-items: center; gap: 16px; }

    #submission-count { font-size: 0.8rem; color: rgba(255,255,255,0.55); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 7px;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.18s;
    }

    .btn-export  { background: var(--orange); color: #fff; }
    .btn-export:hover { background: #d07818; }
    .btn-logout  { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.8); }
    .btn-logout:hover { background: rgba(255,255,255,0.2); }

    /* ── Stats bar ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      padding: 20px 28px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .stat-card {
      background: var(--card);
      border-radius: 10px;
      padding: 16px 18px;
      box-shadow: 0 1px 4px rgba(26,37,80,0.07);
    }

    .stat-card .stat-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-card .stat-value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--navy);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-card .stat-sub {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── Filters ── */
    .filters-bar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 13px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .filter-group { display: flex; align-items: center; gap: 6px; }

    .filters-bar label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .filters-bar select,
    .filters-bar input[type="text"] {
      padding: 7px 10px;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      font-family: inherit;
      font-size: 0.8125rem;
      color: var(--text);
      background: var(--bg);
      cursor: pointer;
      transition: border-color 0.18s;
    }

    .filters-bar select:focus,
    .filters-bar input[type="text"]:focus { outline: none; border-color: var(--navy); }

    #search-input { width: 190px; }
    .filter-count { margin-left: auto; font-size: 0.8rem; color: var(--muted); white-space: nowrap; }

    /* ── Table ── */
    main { padding: 20px 28px; }

    .table-wrap {
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(26,37,80,0.08);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }

    thead { background: var(--navy); color: #fff; }

    th {
      padding: 12px 14px;
      text-align: left;
      font-weight: 600;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    th:hover { background: var(--navy-deep); }
    th.sorted-asc::after  { content: ' ↑'; opacity: 0.7; }
    th.sorted-desc::after { content: ' ↓'; opacity: 0.7; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      cursor: pointer;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f5f6fc; }
    tbody tr.expanded { background: #eef0fb; }

    td { padding: 11px 14px; color: var(--mid); vertical-align: middle; }

    td.id-col   { color: var(--muted); font-size: 0.75rem; width: 44px; }
    td.date-col { white-space: nowrap; color: var(--muted); font-size: 0.75rem; width: 120px; }

    .pill {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .pill.revenue  { background: #e3f2fd; color: #1565c0; }
    .pill.team     { background: #e8f5e9; color: #2e7d32; }
    .pill.worth    { background: #fff8e1; color: #e65100; }
    .pill.clients  { background: #fce4ec; color: #880e4f; }

    /* ── Status dropdown ── */
    th.status-col,
    td.status-col { width: 148px; min-width: 148px; max-width: 148px; }

    .status-wrap { position: relative; display: inline-block; width: 124px; }

    .status-pill {
      display: block;
      width: 100%;
      padding: 5px 10px;
      border-radius: 20px;
      border: none;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      user-select: none;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    .status-pill:hover  { opacity: 0.82; }

    .status-New         { background: #e3f2fd; color: #1565c0; }
    .status-Contacted   { background: #fff3e0; color: #e65100; }
    .status-In-Progress { background: #f3e5f5; color: #6a1b9a; }
    .status-Closed      { background: #e8f5e9; color: #2e7d32; }

    .status-menu {
      position: fixed;
      z-index: 9999;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      box-shadow: 0 6px 20px rgba(26,37,80,0.15);
      overflow: hidden;
      min-width: 140px;
    }

    .status-menu.hidden { display: none; }

    .status-menu li {
      list-style: none;
      padding: 9px 14px;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.13s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-menu li:hover { background: var(--bg); }

    .status-menu li.current { font-weight: 700; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-New         { background: #1565c0; }
    .dot-Contacted   { background: #e65100; }
    .dot-In-Progress { background: #6a1b9a; }
    .dot-Closed      { background: #2e7d32; }

    td.bottleneck-col {
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-style: italic;
      color: var(--muted);
    }

    /* ── Expanded row ── */
    .expand-row td { padding: 0; background: #f7f8fd; }

    .expand-inner {
      padding: 20px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
      border-top: 2px solid var(--orange);
    }

    .expand-field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .expand-field p { font-size: 0.875rem; color: var(--text); line-height: 1.5; }
    .expand-field.full { grid-column: 1 / -1; }

    /* ── Empty / loading ── */
    .state-row td { padding: 60px 20px; text-align: center; color: var(--muted); }

    .spinner-lg {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 1000px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 700px) {
      .stats-bar, .filters-bar, main { padding-left: 16px; padding-right: 16px; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .col-hide { display: none; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-screen">
    <div class="login-card">
      <img src="../PeakTax-Logo.svg" alt="Peak Tax Partners" height="48" />
      <h1>Submissions Dashboard</h1>
      <p>Sign in to view placement questionnaire responses</p>
      <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password" />
      <button id="login-btn">Sign In</button>
      <div id="login-error">Incorrect password. Please try again.</div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <header>
      <img src="../PeakTax-Logo.svg" alt="Peak Tax Partners" style="filter:brightness(0) invert(1);height:34px" />
      <div class="header-right">
        <span id="submission-count"></span>
        <button class="btn btn-export" id="export-btn">⬇ Export CSV</button>
        <button class="btn btn-logout" id="logout-btn">Sign Out</button>
      </div>
    </header>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-label">Total Submissions</div>
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-sub" id="stat-week">— this week</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Top Revenue Tier</div>
        <div class="stat-value" id="stat-rev-val" style="font-size:1.1rem;padding-top:4px">—</div>
        <div class="stat-sub" id="stat-rev-pct"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Most Common Team Size</div>
        <div class="stat-value" id="stat-team-val" style="font-size:1.4rem;padding-top:4px">—</div>
        <div class="stat-sub" id="stat-team-pct"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pipeline</div>
        <div class="stat-sub" id="stat-pipeline" style="font-size:0.8rem;margin-top:8px;line-height:1.8"></div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <div class="filter-group">
        <label>Search</label>
        <input type="text" id="search-input" placeholder="Name, email…" />
      </div>
      <div class="filter-group">
        <label>Revenue</label>
        <select id="filter-revenue">
          <option value="">All</option>
          <option>Under $500K</option>
          <option>$500K – $1M</option>
          <option>$1M – $3M</option>
          <option>$3M – $7M</option>
          <option>$7M+</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Team</label>
        <select id="filter-team">
          <option value="">All</option>
          <option>Solo</option>
          <option>2–5</option>
          <option>6–20</option>
          <option>20+</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Status</label>
        <select id="filter-status">
          <option value="">All</option>
          <option>New</option>
          <option>Contacted</option>
          <option>In Progress</option>
          <option>Closed</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Efficiency</label>
        <select id="filter-efficiency">
          <option value="">All</option>
          <option value="Stone Age">Stone Age</option>
          <option value="Filing Cabinet Era">Filing Cabinet Era</option>
          <option value="75% Digital">75% Digital</option>
          <option value="Efficient">Efficient &amp; Automated</option>
          <option value="Future of Tax">Future of Tax</option>
        </select>
      </div>
      <span class="filter-count" id="filter-count"></span>
    </div>

    <main>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-col="id">#</th>
              <th data-col="submitted_at">Date</th>
              <th data-col="name">Name</th>
              <th data-col="email" class="col-hide">Email</th>
              <th data-col="annual_revenue">Revenue</th>
              <th data-col="team_members" class="col-hide">Team</th>
              <th data-col="client_count" class="col-hide">Clients</th>
              <th data-col="efficiency">Efficiency</th>
              <th data-col="status" class="status-col">Status</th>
              <th data-col="bottleneck">Biggest Bottleneck</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr class="state-row">
              <td colspan="10"><div class="spinner-lg"></div>Loading…</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

<script>
(function () {
  'use strict';

  const SESSION     = 'fc_admin_key';
  const STATUSES    = ['New', 'Contacted', 'In Progress', 'Closed'];

  let allSubmissions = [];
  let filtered       = [];
  let sortCol        = 'id';
  let sortDir        = 'desc';
  let expandedId     = null;
  let adminKey       = null;

  // ── Auth ──────────────────────────────────────────────────────────────────

  function getKey()     { return sessionStorage.getItem(SESSION); }
  function saveKey(k)   { sessionStorage.setItem(SESSION, k); adminKey = k; }
  function clearKey()   { sessionStorage.removeItem(SESSION); adminKey = null; }

  async function tryLogin() {
    const pw = document.getElementById('pw-input').value;
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    if (res.ok) {
      const { ok } = await res.json();
      if (ok) { saveKey(pw); showDashboard(); return; }
    }
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pw-input').select();
  }

  document.getElementById('login-btn').addEventListener('click', tryLogin);
  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

  document.getElementById('logout-btn').addEventListener('click', function () {
    clearKey();
    location.reload();
  });

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display    = 'block';
    loadSubmissions();
  }

  const stored = getKey();
  if (stored) { adminKey = stored; showDashboard(); }

  // ── Load ──────────────────────────────────────────────────────────────────

  async function loadSubmissions() {
    try {
      const res  = await fetch('/api/submissions', { headers: { 'X-Admin-Key': adminKey } });
      const json = await res.json();
      if (res.status === 401) { clearKey(); location.reload(); return; }
      if (!json.success) throw new Error();
      allSubmissions = json.submissions;
      updateStats();
      document.getElementById('submission-count').textContent =
        allSubmissions.length + ' submission' + (allSubmissions.length !== 1 ? 's' : '');
      applyFilters();
    } catch {
      document.getElementById('table-body').innerHTML =
        '<tr class="state-row"><td colspan="10">Failed to load. Please refresh.</td></tr>';
    }
  }

  // ── Stats ─────────────────────────────────────────────────────────────────

  function topOf(arr, key) {
    const counts = {};
    arr.forEach(s => { const v = s[key]; if (v) counts[v] = (counts[v] || 0) + 1; });
    let top = '', max = 0;
    Object.entries(counts).forEach(([k, v]) => { if (v > max) { max = v; top = k; } });
    return { value: top, count: max, pct: arr.length ? Math.round(max / arr.length * 100) : 0 };
  }

  function updateStats() {
    const n   = allSubmissions.length;
    const now = Date.now();
    const week = allSubmissions.filter(s => now - new Date(s.submitted_at).getTime() < 7*86400*1000).length;

    document.getElementById('stat-total').textContent = n;
    document.getElementById('stat-week').textContent  = week + ' this week';

    if (n > 0) {
      const rev  = topOf(allSubmissions, 'annual_revenue');
      const team = topOf(allSubmissions, 'team_members');
      document.getElementById('stat-rev-val').textContent  = rev.value  || '—';
      document.getElementById('stat-rev-pct').textContent  = rev.value  ? rev.pct + '% of firms' : '';
      document.getElementById('stat-team-val').textContent = team.value || '—';
      document.getElementById('stat-team-pct').textContent = team.value ? team.pct + '% of firms' : '';

      const pipeline = {};
      STATUSES.forEach(s => pipeline[s] = 0);
      allSubmissions.forEach(s => { if (pipeline[s.status] !== undefined) pipeline[s.status]++; });
      document.getElementById('stat-pipeline').innerHTML =
        STATUSES.map(s => `<span><strong style="color:var(--navy)">${pipeline[s]}</strong> ${s}</span>`).join(' &nbsp;·&nbsp; ');
    }
  }

  // ── Filters ───────────────────────────────────────────────────────────────

  ['filter-revenue','filter-team','filter-status','filter-efficiency','search-input']
    .forEach(id => document.getElementById(id).addEventListener('input', applyFilters));

  function applyFilters() {
    const revenue    = document.getElementById('filter-revenue').value;
    const team       = document.getElementById('filter-team').value;
    const status     = document.getElementById('filter-status').value;
    const efficiency = document.getElementById('filter-efficiency').value;
    const search     = document.getElementById('search-input').value.toLowerCase().trim();

    filtered = allSubmissions.filter(function (s) {
      if (revenue    && s.annual_revenue !== revenue)          return false;
      if (team       && s.team_members   !== team)             return false;
      if (status     && s.status         !== status)           return false;
      if (efficiency && !s.efficiency.includes(efficiency))    return false;
      if (search) {
        const blob = Object.values(s).join(' ').toLowerCase();
        if (!blob.includes(search)) return false;
      }
      return true;
    });

    document.getElementById('filter-count').textContent =
      filtered.length + ' of ' + allSubmissions.length + ' shown';

    sortAndRender();
  }

  // ── Sort ──────────────────────────────────────────────────────────────────

  document.querySelectorAll('th[data-col]').forEach(function (th) {
    th.addEventListener('click', function () {
      const col = th.dataset.col;
      if (sortCol === col) { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
      else { sortCol = col; sortDir = col === 'id' ? 'desc' : 'asc'; }
      document.querySelectorAll('th').forEach(t => t.classList.remove('sorted-asc','sorted-desc'));
      th.classList.add('sorted-' + sortDir);
      sortAndRender();
    });
  });

  function sortAndRender() {
    const dir = sortDir === 'asc' ? 1 : -1;
    const sorted = filtered.slice().sort(function (a, b) {
      if (sortCol === 'id') return dir * (a.id - b.id);
      return dir * (a[sortCol] || '').localeCompare(b[sortCol] || '');
    });
    renderTable(sorted);
  }

  // ── Render ────────────────────────────────────────────────────────────────

  function fmt(dt) {
    if (!dt) return '—';
    const d = new Date(dt);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' })
      + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function statusClass(s) {
    return 'status-' + (s || 'New').replace(/\s+/g, '-');
  }

  function renderTable(rows) {
    const tbody = document.getElementById('table-body');
    if (!rows.length) {
      tbody.innerHTML = '<tr class="state-row"><td colspan="10">No submissions match the current filters.</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map(function (s) {
      const isExp = expandedId === s.id;
      const row = `<tr class="data-row${isExp?' expanded':''}" data-id="${s.id}">
        <td class="id-col">${s.id}</td>
        <td class="date-col">${fmt(s.submitted_at)}</td>
        <td><strong>${esc(s.name)||'—'}</strong></td>
        <td class="col-hide">${s.email?`<a href="mailto:${esc(s.email)}" style="color:var(--navy)">${esc(s.email)}</a>`:'—'}</td>
        <td><span class="pill revenue">${esc(s.annual_revenue)||'—'}</span></td>
        <td class="col-hide"><span class="pill team">${esc(s.team_members)||'—'}</span></td>
        <td class="col-hide"><span class="pill clients">${esc(s.client_count)||'—'}</span></td>
        <td>${esc(s.efficiency)||'—'}</td>
        <td class="status-col">
          <div class="status-wrap" data-id="${s.id}">
            <button class="status-pill ${statusClass(s.status||'New')}" type="button">${esc(s.status||'New')}</button>
            <ul class="status-menu hidden">
              ${STATUSES.map(st => `<li data-value="${st}" class="${st===(s.status||'New')?'current':''}"><span class="status-dot dot-${st.replace(/\s+/g,'-')}"></span>${st}</li>`).join('')}
            </ul>
          </div>
        </td>
        <td class="bottleneck-col">${esc(s.bottleneck)||''}</td>
      </tr>`;

      const detail = isExp ? `<tr class="expand-row" data-id="${s.id}">
        <td colspan="10"><div class="expand-inner">
          <div class="expand-field"><label>Name</label><p>${esc(s.name)||'—'}</p></div>
          <div class="expand-field"><label>Email</label><p>${s.email?`<a href="mailto:${esc(s.email)}" style="color:var(--navy)">${esc(s.email)}</a>`:'—'}</p></div>
          <div class="expand-field"><label>Phone</label><p>${s.phone?`<a href="tel:${esc(s.phone)}" style="color:var(--navy)">${esc(s.phone)}</a>`:'—'}</p></div>
          <div class="expand-field"><label>Annual Revenue</label><p>${esc(s.annual_revenue)||'—'}</p></div>
          <div class="expand-field"><label>Team Members</label><p>${esc(s.team_members)||'—'}</p></div>
          <div class="expand-field"><label>Firm Worth</label><p>${esc(s.firm_worth)||'—'}</p></div>
          <div class="expand-field"><label>Client Count</label><p>${esc(s.client_count)||'—'}</p></div>
          <div class="expand-field"><label>Tax Returns / Year</label><p>${esc(s.tax_returns)||'—'}</p></div>
          <div class="expand-field"><label>Tax Software</label><p>${esc(s.tax_software)||'—'}</p></div>
          <div class="expand-field"><label>Documentation</label><p>${esc(s.documentation)||'—'}</p></div>
          <div class="expand-field"><label>Efficiency</label><p>${esc(s.efficiency)||'—'}</p></div>
          <div class="expand-field full"><label>Bottleneck</label><p>${esc(s.bottleneck)||'<em style="color:var(--muted)">No response</em>'}</p></div>
        </div></td>
      </tr>` : '';

      return row + detail;
    }).join('');

    // Row click → expand (ignore clicks inside status wrap)
    tbody.querySelectorAll('tr.data-row').forEach(function (tr) {
      tr.addEventListener('click', function (e) {
        if (e.target.closest('.status-wrap')) return;
        const id = parseInt(tr.dataset.id);
        expandedId = expandedId === id ? null : id;
        sortAndRender();
      });
    });

    // Status dropdown — open/close
    tbody.querySelectorAll('.status-wrap').forEach(function (wrap) {
      const btn  = wrap.querySelector('.status-pill');
      const menu = wrap.querySelector('.status-menu');

      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        // Close any other open menus
        tbody.querySelectorAll('.status-menu').forEach(function (m) {
          if (m !== menu) m.classList.add('hidden');
        });
        if (menu.classList.contains('hidden')) {
          const r = btn.getBoundingClientRect();
          menu.style.top  = (r.bottom + 6) + 'px';
          menu.style.left = r.left + 'px';
          menu.classList.remove('hidden');
        } else {
          menu.classList.add('hidden');
        }
      });

      menu.querySelectorAll('li').forEach(function (li) {
        li.addEventListener('click', async function (e) {
          e.stopPropagation();
          const id     = parseInt(wrap.dataset.id);
          const status = li.dataset.value;
          menu.classList.add('hidden');

          // Optimistic update
          const sub = allSubmissions.find(s => s.id === id);
          if (sub) sub.status = status;
          btn.textContent = status;
          btn.className   = 'status-pill ' + statusClass(status);
          menu.querySelectorAll('li').forEach(l => l.classList.toggle('current', l.dataset.value === status));
          updateStats();

          await fetch('/api/submissions', {
            method:  'PATCH',
            headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
            body:    JSON.stringify({ id, status })
          });
        });
      });
    });

    // Close menus on outside click
    document.addEventListener('click', function () {
      tbody.querySelectorAll('.status-menu').forEach(m => m.classList.add('hidden'));
    }, { once: false });
  }

  // ── CSV Export ────────────────────────────────────────────────────────────

  document.getElementById('export-btn').addEventListener('click', function () {
    const headers = ['ID','Submitted At','Name','Email','Phone','Status',
      'Annual Revenue','Team Members','Firm Worth','Client Count',
      'Tax Returns','Tax Software','Documentation','Efficiency','Bottleneck'];
    const rows = filtered.map(s =>
      [s.id, s.submitted_at, s.name, s.email, s.phone, s.status,
       s.annual_revenue, s.team_members, s.firm_worth, s.client_count,
       s.tax_returns, s.tax_software, s.documentation, s.efficiency, s.bottleneck
      ].map(v => '"' + (v||'').replace(/"/g,'""') + '"').join(',')
    );
    const csv  = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), {
      href: url,
      download: 'final-cycle-' + new Date().toISOString().slice(0,10) + '.csv'
    });
    a.click();
    URL.revokeObjectURL(url);
  });

})();
</script>
</body>
</html>
