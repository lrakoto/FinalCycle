<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Final Cycle – Submissions Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #1a2550;
      --navy-deep: #111c3d;
      --orange:    #e8891e;
      --bg:        #f0f2f8;
      --card:      #ffffff;
      --border:    #e1e4f0;
      --text:      #1a1f36;
      --mid:       #4e5470;
      --muted:     #8890ab;
      --error:     #c0392b;
      --success:   #1e7e4a;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Login screen ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 8px 36px rgba(26,37,80,0.13);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .login-card img {
      height: 48px;
      margin-bottom: 28px;
    }

    .login-card h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .login-card p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .login-card input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9375rem;
      color: var(--text);
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .login-card input:focus {
      outline: none;
      border-color: var(--navy);
    }

    .login-card button {
      width: 100%;
      padding: 13px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-card button:hover { background: var(--orange); }

    #login-error {
      color: var(--error);
      font-size: 0.8rem;
      margin-top: 10px;
      display: none;
    }

    /* ── Dashboard ── */
    #dashboard { display: none; }

    header {
      background: var(--navy);
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      box-shadow: 0 2px 12px rgba(26,37,80,0.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header img { height: 34px; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #submission-count {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 7px;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.18s, opacity 0.18s;
    }

    .btn-export {
      background: var(--orange);
      color: #fff;
    }
    .btn-export:hover { background: #d07818; }

    .btn-logout {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8);
    }
    .btn-logout:hover { background: rgba(255,255,255,0.2); }

    /* ── Filters ── */
    .filters-bar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .filters-bar label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-right: 4px;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filters-bar select,
    .filters-bar input[type="text"] {
      padding: 7px 10px;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      font-family: inherit;
      font-size: 0.8125rem;
      color: var(--text);
      background: var(--bg);
      cursor: pointer;
      transition: border-color 0.18s;
    }

    .filters-bar select:focus,
    .filters-bar input[type="text"]:focus {
      outline: none;
      border-color: var(--navy);
    }

    #search-input { width: 200px; }

    .filter-count {
      margin-left: auto;
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Main content ── */
    main { padding: 24px 28px; }

    /* ── Table ── */
    .table-wrap {
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(26,37,80,0.08);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }

    thead {
      background: var(--navy);
      color: #fff;
    }

    th {
      padding: 13px 14px;
      text-align: left;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    th:hover { background: var(--navy-deep); }
    th.sorted-asc::after  { content: ' ↑'; opacity: 0.8; }
    th.sorted-desc::after { content: ' ↓'; opacity: 0.8; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      cursor: pointer;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f5f6fc; }
    tbody tr.expanded { background: #eef0fb; }

    td {
      padding: 12px 14px;
      color: var(--mid);
      vertical-align: middle;
    }

    td.id-col {
      color: var(--muted);
      font-size: 0.75rem;
      width: 44px;
    }

    td.date-col {
      white-space: nowrap;
      color: var(--muted);
      font-size: 0.75rem;
      width: 130px;
    }

    .pill {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      background: #e8eaf6;
      color: var(--navy);
      white-space: nowrap;
    }

    .pill.revenue  { background: #e3f2fd; color: #1565c0; }
    .pill.team     { background: #e8f5e9; color: #2e7d32; }
    .pill.worth    { background: #fff8e1; color: #e65100; }
    .pill.clients  { background: #fce4ec; color: #880e4f; }

    td.bottleneck-col {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-style: italic;
      color: var(--muted);
    }

    /* ── Expanded row ── */
    .expand-row td {
      padding: 0;
      background: #f7f8fd;
    }

    .expand-inner {
      padding: 20px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      border-top: 2px solid var(--orange);
    }

    .expand-field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .expand-field p {
      font-size: 0.875rem;
      color: var(--text);
      line-height: 1.5;
    }

    .expand-field.full { grid-column: 1 / -1; }

    /* ── Empty / loading states ── */
    .state-row td {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }

    .spinner-lg {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .filters-bar { padding: 12px 16px; }
      main { padding: 16px; }
      th, td { padding: 10px 10px; }
      .col-hide { display: none; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-screen">
    <div class="login-card">
      <img src="../FinalCycle-Logo.webp" alt="Final Cycle" />
      <h1>Submissions Dashboard</h1>
      <p>Sign in to view placement questionnaire responses</p>
      <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password" />
      <button id="login-btn">Sign In</button>
      <div id="login-error">Incorrect password. Try again.</div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <header>
      <img src="../FinalCycle-Logo.webp" alt="Final Cycle" style="filter: brightness(0) invert(1);" />
      <div class="header-right">
        <span id="submission-count"></span>
        <button class="btn btn-export" id="export-btn">⬇ Export CSV</button>
        <button class="btn btn-logout" id="logout-btn">Sign Out</button>
      </div>
    </header>

    <div class="filters-bar">
      <div class="filter-group">
        <label>Search</label>
        <input type="text" id="search-input" placeholder="Any field…" />
      </div>
      <div class="filter-group">
        <label>Revenue</label>
        <select id="filter-revenue">
          <option value="">All</option>
          <option>Under $500K</option>
          <option>$500K – $1M</option>
          <option>$1M – $3M</option>
          <option>$3M – $7M</option>
          <option>$7M+</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Team</label>
        <select id="filter-team">
          <option value="">All</option>
          <option>Solo</option>
          <option>2–5</option>
          <option>6–20</option>
          <option>20+</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Clients</label>
        <select id="filter-clients">
          <option value="">All</option>
          <option>0–10</option>
          <option>11–25</option>
          <option>26–50</option>
          <option>51–75</option>
          <option>76+</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Efficiency</label>
        <select id="filter-efficiency">
          <option value="">All</option>
          <option value="Stone Age">Stone Age</option>
          <option value="Filing Cabinet Era">Filing Cabinet Era</option>
          <option value="75% Digital">75% Digital</option>
          <option value="Efficient &amp; Automated">Efficient &amp; Automated</option>
          <option value="Future of Tax">Future of Tax</option>
        </select>
      </div>
      <span class="filter-count" id="filter-count"></span>
    </div>

    <main>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-col="id">#</th>
              <th data-col="submitted_at">Date</th>
              <th data-col="name">Name</th>
              <th data-col="email" class="col-hide">Email</th>
              <th data-col="annual_revenue">Revenue</th>
              <th data-col="team_members">Team</th>
              <th data-col="firm_worth" class="col-hide">Worth</th>
              <th data-col="client_count" class="col-hide">Clients</th>
              <th data-col="efficiency">Efficiency</th>
              <th data-col="bottleneck">Bottleneck</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr class="state-row">
              <td colspan="10"><div class="spinner-lg"></div>Loading submissions…</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

<script>
(function () {
  'use strict';

  const PASS    = 'RHAMGMT1!';
  const API_KEY = 'RHAMGMT1!';
  const SESSION = 'fc_admin_auth';

  let allSubmissions = [];
  let filtered       = [];
  let sortCol        = 'id';
  let sortDir        = 'desc';
  let expandedId     = null;

  // ── Auth ──────────────────────────────────────────────────────────────────

  function isAuthed() { return sessionStorage.getItem(SESSION) === '1'; }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display    = 'block';
    loadSubmissions();
  }

  document.getElementById('login-btn').addEventListener('click', tryLogin);
  document.getElementById('pw-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') tryLogin();
  });

  function tryLogin() {
    if (document.getElementById('pw-input').value === PASS) {
      sessionStorage.setItem(SESSION, '1');
      document.getElementById('login-error').style.display = 'none';
      showDashboard();
    } else {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('pw-input').select();
    }
  }

  document.getElementById('logout-btn').addEventListener('click', function () {
    sessionStorage.removeItem(SESSION);
    location.reload();
  });

  if (isAuthed()) showDashboard();

  // ── Load data ─────────────────────────────────────────────────────────────

  async function loadSubmissions() {
    try {
      const res = await fetch('/api/submissions', {
        headers: { 'X-Admin-Key': API_KEY }
      });
      const json = await res.json();
      if (!json.success) throw new Error('API error');
      allSubmissions = json.submissions;
      document.getElementById('submission-count').textContent =
        allSubmissions.length + ' total submission' + (allSubmissions.length !== 1 ? 's' : '');
      applyFilters();
    } catch (e) {
      document.getElementById('table-body').innerHTML =
        '<tr class="state-row"><td colspan="10">Failed to load submissions. Please refresh.</td></tr>';
    }
  }

  // ── Filters ───────────────────────────────────────────────────────────────

  ['filter-revenue','filter-team','filter-clients','filter-efficiency','search-input']
    .forEach(id => document.getElementById(id).addEventListener('input', applyFilters));

  function applyFilters() {
    const revenue    = document.getElementById('filter-revenue').value;
    const team       = document.getElementById('filter-team').value;
    const clients    = document.getElementById('filter-clients').value;
    const efficiency = document.getElementById('filter-efficiency').value;
    const search     = document.getElementById('search-input').value.toLowerCase().trim();

    filtered = allSubmissions.filter(function (s) {
      if (revenue    && s.annual_revenue !== revenue)    return false;
      if (team       && s.team_members   !== team)       return false;
      if (clients    && s.client_count   !== clients)    return false;
      if (efficiency && !s.efficiency.startsWith(efficiency)) return false;
      if (search) {
        const blob = Object.values(s).join(' ').toLowerCase();
        if (!blob.includes(search)) return false;
      }
      return true;
    });

    document.getElementById('filter-count').textContent =
      filtered.length + ' of ' + allSubmissions.length + ' shown';

    sortAndRender();
  }

  // ── Sort ──────────────────────────────────────────────────────────────────

  document.querySelectorAll('th[data-col]').forEach(function (th) {
    th.addEventListener('click', function () {
      const col = th.dataset.col;
      if (sortCol === col) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortCol = col;
        sortDir = 'desc';
      }
      document.querySelectorAll('th').forEach(t =>
        t.classList.remove('sorted-asc', 'sorted-desc'));
      th.classList.add('sorted-' + sortDir);
      sortAndRender();
    });
  });

  function sortAndRender() {
    const dir = sortDir === 'asc' ? 1 : -1;
    const sorted = filtered.slice().sort(function (a, b) {
      const av = a[sortCol] || '';
      const bv = b[sortCol] || '';
      if (sortCol === 'id') return dir * (a.id - b.id);
      return dir * av.localeCompare(bv);
    });
    renderTable(sorted);
  }

  // ── Render ────────────────────────────────────────────────────────────────

  function fmt(dt) {
    if (!dt) return '—';
    const d = new Date(dt);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
      + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function esc(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderTable(rows) {
    const tbody = document.getElementById('table-body');

    if (rows.length === 0) {
      tbody.innerHTML = '<tr class="state-row"><td colspan="10">No submissions match the current filters.</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map(function (s) {
      const isExpanded = expandedId === s.id;
      const row = `<tr class="data-row ${isExpanded ? 'expanded' : ''}" data-id="${s.id}">
        <td class="id-col">${s.id}</td>
        <td class="date-col">${fmt(s.submitted_at)}</td>
        <td><strong>${esc(s.name) || '—'}</strong></td>
        <td class="col-hide">${esc(s.email) ? `<a href="mailto:${esc(s.email)}" style="color:var(--navy)">${esc(s.email)}</a>` : '—'}</td>
        <td><span class="pill revenue">${esc(s.annual_revenue) || '—'}</span></td>
        <td><span class="pill team">${esc(s.team_members) || '—'}</span></td>
        <td class="col-hide"><span class="pill worth">${esc(s.firm_worth) || '—'}</span></td>
        <td class="col-hide"><span class="pill clients">${esc(s.client_count) || '—'}</span></td>
        <td>${esc(s.efficiency) || '—'}</td>
        <td class="bottleneck-col">${esc(s.bottleneck) || ''}</td>
      </tr>`;

      const detail = isExpanded ? `<tr class="expand-row" data-id="${s.id}">
        <td colspan="10">
          <div class="expand-inner">
            <div class="expand-field"><label>Name</label><p>${esc(s.name)||'—'}</p></div>
            <div class="expand-field"><label>Email</label><p>${esc(s.email) ? `<a href="mailto:${esc(s.email)}" style="color:var(--navy)">${esc(s.email)}</a>` : '—'}</p></div>
            <div class="expand-field"><label>Phone</label><p>${esc(s.phone) ? `<a href="tel:${esc(s.phone)}" style="color:var(--navy)">${esc(s.phone)}</a>` : '—'}</p></div>
            <div class="expand-field"><label>Annual Revenue</label><p>${esc(s.annual_revenue)||'—'}</p></div>
            <div class="expand-field"><label>Team Members</label><p>${esc(s.team_members)||'—'}</p></div>
            <div class="expand-field"><label>Firm Worth</label><p>${esc(s.firm_worth)||'—'}</p></div>
            <div class="expand-field"><label>Client Count</label><p>${esc(s.client_count)||'—'}</p></div>
            <div class="expand-field"><label>Tax Returns / Year</label><p>${esc(s.tax_returns)||'—'}</p></div>
            <div class="expand-field"><label>Tax Software</label><p>${esc(s.tax_software)||'—'}</p></div>
            <div class="expand-field"><label>Documentation Storage</label><p>${esc(s.documentation)||'—'}</p></div>
            <div class="expand-field"><label>Operational Efficiency</label><p>${esc(s.efficiency)||'—'}</p></div>
            <div class="expand-field full"><label>Bottleneck</label><p>${esc(s.bottleneck)||'<em style="color:var(--muted)">No response</em>'}</p></div>
          </div>
        </td>
      </tr>` : '';

      return row + detail;
    }).join('');

    // Row click → expand/collapse
    tbody.querySelectorAll('tr.data-row').forEach(function (tr) {
      tr.addEventListener('click', function () {
        const id = parseInt(tr.dataset.id);
        expandedId = expandedId === id ? null : id;
        sortAndRender();
      });
    });
  }

  // ── CSV Export ────────────────────────────────────────────────────────────

  document.getElementById('export-btn').addEventListener('click', function () {
    const headers = [
      'ID','Submitted At','Name','Email','Phone',
      'Annual Revenue','Team Members','Firm Worth',
      'Client Count','Tax Returns','Tax Software','Documentation','Efficiency','Bottleneck'
    ];
    const rows = filtered.map(function (s) {
      return [
        s.id, s.submitted_at, s.name, s.email, s.phone,
        s.annual_revenue, s.team_members, s.firm_worth,
        s.client_count, s.tax_returns, s.tax_software, s.documentation,
        s.efficiency, s.bottleneck
      ].map(function (v) {
        return '"' + (v || '').replace(/"/g, '""') + '"';
      }).join(',');
    });

    const csv  = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'final-cycle-submissions-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
  });

})();
</script>
</body>
</html>
